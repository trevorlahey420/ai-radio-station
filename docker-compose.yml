# ============================================================
# AI Radio Station — Docker Compose
# Compatible with: Ubuntu on VirtualBox (linux/amd64)
# Run with: docker compose up -d
# ============================================================

services:

  # ── Icecast2 Audio Server ──────────────────────────────────
  icecast:
    image: moul/icecast:latest
    platform: linux/amd64          # explicit for VirtualBox/Ubuntu
    container_name: radio-icecast
    restart: unless-stopped
    ports:
      - "8000:8000"                # Icecast stream port
    environment:
      ICECAST_SOURCE_PASSWORD: ${ICECAST_PASSWORD:-hackme}
      ICECAST_ADMIN_PASSWORD: ${ICECAST_ADMIN_PASSWORD:-admin123}
      ICECAST_RELAY_PASSWORD: ${ICECAST_RELAY_PASSWORD:-relay123}
      ICECAST_HOSTNAME: localhost
      ICECAST_MAX_CLIENTS: 100
      ICECAST_MAX_SOURCES: 4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - radio-net

  # ── Radio Station App ──────────────────────────────────────
  radio:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64              # explicit for VirtualBox/Ubuntu
    platform: linux/amd64
    container_name: radio-station
    restart: unless-stopped
    depends_on:
      icecast:
        condition: service_healthy
    ports:
      - "8080:8080"                # Web player / API
    environment:
      # ── Required API Keys (set in .env file) ──
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      # ── Optional — only needed if not using budget mode ──
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID:-}

      # ── News & Weather ──
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}

      # ── Discord (optional) ──
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}

      # ── Icecast connection ──
      ICECAST_HOST: icecast
      ICECAST_PORT: 8000
      ICECAST_PASSWORD: ${ICECAST_PASSWORD:-hackme}
      ICECAST_MOUNT: /radio

      # ── App settings ──
      LOG_LEVEL: INFO
      PYTHONUNBUFFERED: "1"        # ensures logs show in real-time

    volumes:
      - ./config:/app/config:ro    # read-only config mount (live reload)
      - ./outputs:/app/outputs     # writable outputs (queue, now_playing)
      - audio_cache:/app/outputs/audio_cache  # persistent audio cache

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    networks:
      - radio-net

# ── Volumes ────────────────────────────────────────────────────
volumes:
  audio_cache:
    driver: local                  # stored on VirtualBox VM disk

# ── Networks ───────────────────────────────────────────────────
networks:
  radio-net:
    driver: bridge
